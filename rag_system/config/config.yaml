llm_provider: openrouter  # "openrouter" or "ollama"

openrouter:
  model: llama-3.1-8b-instant
  base_url: https://api.groq.com/openai/v1
  temperature: 0.2
  max_tokens: 1500

ollama:
  model: phi3:mini
  base_url: http://localhost:11434
  temperature: 0.2
  max_tokens: 1500

embedding:
  model: BAAI/bge-small-en-v1.5
  provider: local  # "local" for dev, "hf" for Railway deploy

retrieval:
  top_k: 15
  similarity_threshold: 0.20

chunking:
  chunk_size: 500
  overlap: 100

vectordb:
  provider: supabase  # "chromadb" or "supabase"
