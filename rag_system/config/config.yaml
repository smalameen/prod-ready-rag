openrouter:
  model: openai/gpt-5-mini
  temperature: 0.2
  max_tokens: 2000

embedding:
  model: openai/text-embedding-3-small
  provider: api  # "local" for SentenceTransformer, "api" for OpenRouter/OpenAI

retrieval:
  top_k: 5
  similarity_threshold: 0.20

chunking:
  chunk_size: 500
  overlap: 100

vectordb:
  provider: chromadb
