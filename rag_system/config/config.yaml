llm_provider: openrouter  # "openrouter" or "ollama"

openrouter:
  model: openai/gpt-5-mini
  temperature: 0.2
  max_tokens: 1500

ollama:
  model: llama3.2
  base_url: http://localhost:11434
  temperature: 0.2
  max_tokens: 1500

embedding:
  model: BAAI/bge-small-en-v1.5
  provider: local

retrieval:
  top_k: 15
  similarity_threshold: 0.20

chunking:
  chunk_size: 500
  overlap: 100

vectordb:
  provider: chromadb
